<section #ctaRoot class="cta-venture" [@ctaReveal]="isVisible() ? 'visible' : 'hidden'">
  <div class="background-overlay"></div>
  <div class="content">
    <div class="venture-header cta-reveal">
      <div class="line"></div>
      <h2>LET'S VENTURE</h2>
      <div class="line"></div>
    </div>

    <p class="venture-sub cta-reveal">
      Scopri un'esperienza di viaggio unica e immersiva per la tua prossima grande avventura.
    </p>

    <a routerLink="/itineraries/new" class="btn-venture cta-reveal">
      INIZIA ORA
    </a>

    <p class="venture-contact cta-reveal">
      Oppure esplora i consigli del nostro team di viaggiatori
    </p>
  </div>
</section>
