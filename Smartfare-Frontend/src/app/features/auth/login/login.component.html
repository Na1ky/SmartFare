<div class="auth-page mt-5">
  <div class="background-canvas-container">
    <div class="world-map-layer"></div>
    <canvas #authCanvas class="auth-bg-canvas"></canvas>
  </div>
  <app-navbar class="auth-navbar"></app-navbar>
  <div class="auth-wrapper">
    <!-- Left Side: Visual -->
    <div class="auth-visual">
      <div class="visual-content">
        <h1 class="visual-title">Scopri il tuo <br> prossimo viaggio.</h1>
        <p class="visual-subtitle">Unisciti alla nostra community di viaggiatori e pianifica il tuo itinerario perfetto
          con facilità.</p>

      </div>
      <div class="visual-overlay"></div>
    </div>

    <!-- Right Side: Content -->
    <div class="auth-content">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo-container">
            <h2 class="logo-text">Smart<span class="text-accent">fare</span></h2>
          </div>
          <h1 class="welcome-text">Bentornato!</h1>
          <p class="subtitle">Accedi al tuo account per continuare il tuo viaggio.</p>
        </div>

        <form class="auth-form" (submit)="Login()">
          <div class="form-group">
            <label for="email">Indirizzo Email</label>
            <div class="input-wrapper">
              <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder="nome@esempio.com" />
            </div>
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="password">Password</label>
              <a routerLink="/forgot-password" class="forgot-link">Password dimenticata?</a>
            </div>
            <div class="input-wrapper">
              <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password"
                required placeholder="••••••••" />
              <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
                @if(!showPassword){
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                }@else {
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                      d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                    </path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                }
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox-container">
              <input type="checkbox" name="rememberMe">
              <span class="checkmark"></span>
              <span class="label-text">Ricordami</span>
            </label>
          </div>

          <button type="submit" class="submit-btn">
            <span>Accedi</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>

          <div class="auth-divider">
            <span>Oppure continua con</span>
          </div>

          <div class="social-actions">
            <button type="button" class="social-btn github-btn" (click)="startGithubLogin()">
              <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor"
                  d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.35 6.84 9.71.5.1.68-.22.68-.5 0-.24-.01-1.03-.01-1.87-2.78.62-3.37-1.21-3.37-1.21-.46-1.2-1.11-1.51-1.11-1.51-.91-.64.07-.62.07-.62 1 .07 1.53 1.05 1.53 1.05.9 1.57 2.35 1.12 2.92.86.09-.67.35-1.12.63-1.38-2.22-.26-4.55-1.14-4.55-5.05 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.73 0 0 .84-.27 2.75 1.05A9.3 9.3 0 0 1 12 6.84c.85 0 1.71.12 2.51.35 1.9-1.32 2.74-1.05 2.74-1.05.55 1.42.2 2.47.1 2.73.64.72 1.03 1.63 1.03 2.75 0 3.92-2.33 4.78-4.56 5.04.36.32.68.95.68 1.92 0 1.39-.01 2.51-.01 2.85 0 .28.18.61.69.5A10.24 10.24 0 0 0 22 12.23C22 6.58 17.52 2 12 2Z" />
              </svg>
              <span>Continua con GitHub</span>
            </button>
            <div class="google-btn-wrapper">
              <asl-google-signin-button type="standard" size="large" shape="pill" theme="filled_black">
              </asl-google-signin-button>
            </div>
          </div>
        </form>

        <div class="auth-footer">
          <p>Non hai un account? <a [routerLink]="['/register']" class="link">Registrati</a></p>
        </div>
      </div>

    </div>
  </div>
</div>
