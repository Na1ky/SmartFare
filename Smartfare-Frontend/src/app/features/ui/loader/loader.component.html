@if (show()) {
<div class="loader-shell" aria-hidden="true">
  <div class="loader-backdrop"></div>
</div>

<section class="loader-panel" role="status" aria-live="polite" [attr.aria-busy]="show()">
  <div class="loader-content">
    <div class="loader-visual">
      <div class="compass">
        <div class="compass-ring"></div>
        <div class="compass-needle"></div>
        <div class="compass-core"></div>
        <div class="compass-glow"></div>
      </div>
      <div class="loader-icon-container">
        <i class="bi loader-icon" [class]="phases[activePhaseIndex()].icon"></i>
      </div>
    </div>

    <div class="loader-text">
      <p class="loader-brand">SmartFare</p>
      <p class="loader-label">{{ phases[activePhaseIndex()].label }}</p>

      <div class="progress-container">
        <div class="progress-bar" [style.width.%]="progress()">
          <div class="progress-glow"></div>
        </div>
      </div>

      <p class="loader-message">{{ message() }}</p>
    </div>
  </div>
</section>
}
