<div class="builder-container">
  <div class="builder-atmosphere" aria-hidden="true">
    <span class="glow glow-a"></span>
    <span class="glow glow-b"></span>
    <span class="glow glow-c"></span>
  </div>

  <app-builder-header [workspace]="workspace()" (navRequest)="handleNavigationIntercept($event)"
    (saveRequest)="handleSaveRequest()" (exportRequest)="onExportItinerary($event)">
  </app-builder-header>

  <main class="builder-workspace" [class.builder-workspace--chat]="ui.showChat()" [class.builder-workspace--no-sidebar]="!ui.showSidebar()">
    @if (ui.showSidebar()) {
      <aside class="workspace-sidebar workspace-panel" 
             [class.mobile-active]="ui.mobileActiveTab() === 'tools'"
             aria-label="Esplora punti di interesse">
        <app-builder-sidebar [workspace]="workspace()" [savedPoiKeys]="savedPoiKeys()" (focusSidebar)="onSidebarFocused()"
          (previewPoi)="onPreviewPoi($event)" (addPoi)="onAddPoi($event)">
        </app-builder-sidebar>
      </aside>
    }

    <section class="workspace-map workspace-panel" 
             [class.mobile-active]="ui.mobileActiveTab() === 'map' || ui.mobileActiveTab() === 'summary'"
             aria-label="Mappa itinerario">
      @if (!ui.showSummary()) {
      <app-builder-map [location]="workspace()?.location || null" [savedPois]="filteredSavedPois()"
        [routePois]="savedPois()" [availablePois]="mapAvailablePois()" [previewPoi]="previewPoi()"
        [markerColor]="ui.markerColor()" (mapFocused)="onMapFocused()" (orderChanged)="applyOptimizedOrder($event)"
        (addPoi)="onAddPoi($event)" (removePoi)="onRemovePoi($event)">
      </app-builder-map>
      } @else {
      <div class="summary-container">
        <app-builder-summary [workspace]="workspace()" (showOnMap)="onPreviewPoi($event)">
        </app-builder-summary>
      </div>
      }
    </section>

    @if (ui.showChat()) {
    <aside class="workspace-chat workspace-panel" 
           [class.mobile-active]="ui.mobileActiveTab() === 'ai'"
           aria-label="Area assistente AI">
      <app-builder-chat [workspace]="workspace()" [itinerary]="itineraryService.itinerary()"></app-builder-chat>
    </aside>
    }
  </main>

  <!-- Mobile Bottom Toolbar -->
  <nav class="mobile-bottom-bar d-lg-none">
    <button class="mobile-tab-btn" [class.active]="ui.mobileActiveTab() === 'map'" (click)='setMobileTab("map")'>
      <i class="bi bi-map"></i>
      <span>Mappa</span>
    </button>
    <button class="mobile-tab-btn" [class.active]="ui.mobileActiveTab() === 'summary'" (click)='setMobileTab("summary")'>
      <i class="bi bi-list-ul"></i>
      <span>Riepilogo</span>
    </button>
    <button class="mobile-tab-btn" [class.active]="ui.mobileActiveTab() === 'ai'" (click)='setMobileTab("ai")'>
      <i class="bi bi-robot"></i>
      <span>AI</span>
    </button>
    <button class="mobile-tab-btn" [class.active]="ui.mobileActiveTab() === 'tools'" (click)='setMobileTab("tools")'>
      <i class="bi bi-grid"></i>
      <span>Attività</span>
    </button>
  </nav>

  @if (workspaceError()) {
  <div class="builder-overlay builder-overlay-error">
    <div>
      <p>{{ workspaceError() }}</p>
      <button class="btn btn-light" (click)="onChangeLocationRequest()">Scegli destinazione</button>
    </div>
  </div>
  }

  <!-- POI Editor Modal -->
  @if (editingPoi() && editingItem()) {
  <app-builder-poi-editor [poi]="editingPoi()" [item]="editingItem()" [isOpen]="showPoiEditor()"
    (close)="onPoiEditorClose()" (save)="onPoiEditorSave($event)" (delete)="onPoiEditorDelete()">
  </app-builder-poi-editor>
  }

  <!-- Modals -->
  @if (showLoginPrompt()) {
  <app-login-prompt-modal (login)="onLoginRedirect()" (continueWithoutSaving)="onContinueExit()" (close)="closeModal()">
  </app-login-prompt-modal>
  }
</div>
